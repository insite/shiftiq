<!DOCTYPE html>
<html>
<head>
    <style type="text/css">
        body {
            font-family: 'Calibri';
            font-size: 16px;
            margin: 0;
        }

        .form-text {
            font-size: 0.8em;
            color: #999;
        }
    </style>
</head>
<body>
    <h1 id="title" style="margin-bottom: 6px; font-weight: normal;"></h1>
    <div id="subtitle"></div>

    <script type="text/javascript">
        (function () {
            var variables = (function (a) {
                if (a === '') return {};
                var b = {};
                for (var i = 0; i < a.length; ++i) {
                    var p = a[i].split('=', 2);
                    if (p.length !== 2) continue;
                    b[p[0]] = decodeURIComponent(p[1].replace(/\+/g, " "));
                }
                return b;
            })(window.location.search.substring(1).split('&'));

            document.getElementById('title').innerText = String(variables.title);
            document.getElementById('subtitle').innerText = String(variables.subtitle);
        })();
    </script>
</body>
</html>
